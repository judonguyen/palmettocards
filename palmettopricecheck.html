<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Palmetto Price Check | Palmetto Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
    :root {
        --bg: #ffffff; --panel: #ffffff; --panel-2: #f6f6f6; --border: #e3e3e3;
        --text: #121212; --muted: #6b7280; --accent: #121212;
        --up: #16a34a; --down: #dc2626;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
        font-family: "Assistant", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg); color: var(--text); min-height: 100vh; padding: 36px 20px;
    }
    .container { max-width: 1080px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 18px; }
    .brand-logo { height: 60px; width: auto; margin-bottom: 12px; }
    header h1 { margin: 0 0 6px; font-size: 28px; font-weight: 800; letter-spacing: -0.01em; }
    header p { margin: 0; color: var(--muted); font-size: 15px; }
    .sample-banner {
        max-width: 1080px; margin: 0 auto 22px; padding: 12px 16px; border-radius: 10px;
        background: rgba(245, 158, 11, 0.12); border: 1px solid rgba(245, 158, 11, 0.35);
        color: #92400e; font-size: 14px; text-align: center; font-weight: 600;
    }
    .statsbar {
        display: flex; gap: 24px; justify-content: center; flex-wrap: wrap;
        margin-bottom: 22px; color: var(--muted); font-size: 13px;
    }
    .statsbar .stat strong { color: var(--text); font-size: 18px; font-weight: 800; display: block; }
    .controls {
        background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
        padding: 16px; margin-bottom: 18px; box-shadow: 0 1px 4px rgba(18,18,18,0.08);
        display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    }
    .controls input[type="text"] {
        flex: 1; min-width: 220px; padding: 11px 14px; background: #fff;
        border: 1px solid var(--border); border-radius: 10px; color: var(--text);
        font-size: 15px; outline: none; font-family: inherit;
    }
    .controls input[type="text"]:focus { border-color: var(--accent); }
    .controls select {
        padding: 11px 12px; background: #fff; border: 1px solid var(--border);
        border-radius: 10px; color: var(--text); font-size: 14px; font-family: inherit; cursor: pointer;
    }
    .table-wrap {
        background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
        box-shadow: 0 1px 4px rgba(18,18,18,0.08); overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    thead th {
        text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em;
        color: var(--muted); font-weight: 700; padding: 14px 16px; border-bottom: 1px solid var(--border);
        white-space: nowrap;
    }
    thead th.num, tbody td.num { text-align: right; }
    tbody td { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; font-size: 14px; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--panel-2); }
    .prod-title { font-weight: 700; }
    .prod-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .pill {
        display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 9px;
        border-radius: 99px; background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
        white-space: nowrap;
    }
    .price { font-weight: 800; font-size: 15px; white-space: nowrap; }
    .range { color: var(--muted); white-space: nowrap; }
    .trend { font-weight: 700; white-space: nowrap; }
    .trend.up { color: var(--up); }
    .trend.down { color: var(--down); }
    .trend.flat { color: var(--muted); }
    .empty { padding: 30px; text-align: center; color: var(--muted); }
    footer { text-align: center; margin-top: 26px; color: var(--muted); font-size: 13px; }
    @media (max-width: 600px) { body { padding: 20px 12px; } .controls { flex-direction: column; align-items: stretch; } }
</style>
</head>
<body>

<div class="container">

    <header>
        <img class="brand-logo" src="https://palmettocards.com/cdn/shop/files/Screenshot_2023-06-26_184054.png?v=1687822886&width=400" alt="Palmetto Cards" />
        <h1>Palmetto Price Check</h1>
        <p>Sealed wax box &amp; case price tracker — Pokémon and sports</p>
    </header>

</div>

<div class="sample-banner">
    ⚠️ Sample data for layout preview only — live pricing is not connected yet.
</div>

<div class="container">

    <div class="statsbar">
        <div class="stat"><strong id="statCount">—</strong> products tracked</div>
        <div class="stat"><strong id="statCats">—</strong> categories</div>
        <div class="stat"><strong>Live</strong> data: coming soon</div>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Search a sealed box… e.g. 151, Prizm, Topps Series 1" autocomplete="off" />
        <select id="categoryFilter">
            <option value="all">All categories</option>
        </select>
        <select id="sortSelect">
            <option value="name">Sort: Name (A–Z)</option>
            <option value="priceDesc">Sort: Price (high → low)</option>
            <option value="priceAsc">Sort: Price (low → high)</option>
            <option value="trendDesc">Sort: 7-day trend (gainers)</option>
            <option value="trendAsc">Sort: 7-day trend (drops)</option>
        </select>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Category</th>
                    <th>Box Type</th>
                    <th class="num">Avg Price</th>
                    <th class="num">30-Day Range</th>
                    <th class="num">7-Day</th>
                </tr>
            </thead>
            <tbody id="productBody"></tbody>
        </table>
    </div>

    <footer>Palmetto Cards &middot; Lexington, SC</footer>

</div>
<script src="pricecheck.js"></script>
</body>
</html>
